<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5ECD7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F2D8E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2C4CE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background — wide rectangle to wrap fully around can -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- JUYCI wordmark — centered vertically and horizontally -->
  <text
    x="600"
    y="240"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="130"
    font-weight="300"
    fill="#2C2C2C"
    text-anchor="middle"
    letter-spacing="22"
    opacity="0.88"
  >JUYCI</text>

  <!-- glow soda -->
  <text
    x="600"
    y="300"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="300"
    fill="#6B5555"
    text-anchor="middle"
    letter-spacing="12"
    font-style="italic"
  >glow soda</text>

  <!-- Thin divider -->
  <line x1="490" y1="330" x2="710" y2="330" stroke="rgba(180,130,130,0.5)" stroke-width="0.8"/>

  <!-- LYCHEE PEACH -->
  <text
    x="600"
    y="368"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="24"
    font-weight="400"
    fill="#8B6060"
    text-anchor="middle"
    letter-spacing="8"
  >LYCHEE PEACH</text>

  <!-- Thin divider -->
  <line x1="490" y1="390" x2="710" y2="390" stroke="rgba(180,130,130,0.5)" stroke-width="0.8"/>

  <!-- glow with every sip -->
  <text
    x="600"
    y="428"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="300"
    fill="#9B7070"
    text-anchor="middle"
    letter-spacing="5"
    font-style="italic"
  >glow with every sip</text>

</svg>
