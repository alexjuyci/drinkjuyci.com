<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5ECD7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F2D8E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2C4CE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- JUYCI -->
  <text x="50%" y="42%" dominant-baseline="middle" text-anchor="middle"
    font-family="Georgia, serif" font-size="100" font-weight="300"
    fill="#2C2C2C" letter-spacing="20" opacity="0.88">JUYCI</text>

  <!-- glow soda -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
    font-family="Georgia, serif" font-size="26" font-weight="300"
    fill="#6B5555" letter-spacing="12" font-style="italic">glow soda</text>

  <!-- divider -->
  <line x1="42%" y1="61%" x2="58%" y2="61%" stroke="rgba(180,130,130,0.5)" stroke-width="0.8"/>

  <!-- LYCHEE PEACH -->
  <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle"
    font-family="Georgia, serif" font-size="22" font-weight="400"
    fill="#8B6060" letter-spacing="8">LYCHEE PEACH</text>

  <!-- divider -->
  <line x1="42%" y1="74%" x2="58%" y2="74%" stroke="rgba(180,130,130,0.5)" stroke-width="0.8"/>

  <!-- glow with every sip -->
  <text x="50%" y="82%" dominant-baseline="middle" text-anchor="middle"
    font-family="Georgia, serif" font-size="16" font-weight="300"
    fill="#9B7070" letter-spacing="5" font-style="italic">glow with every sip</text>

</svg>
