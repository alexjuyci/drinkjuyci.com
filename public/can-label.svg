<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5ECD7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F2D8E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2C4CE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bg)"/>

  <!-- JUYCI -->
  <text x="300" y="390" font-family="Georgia, serif" font-size="110" font-weight="300"
    fill="#2C2C2C" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="18" opacity="0.88">JUYCI</text>

  <!-- glow soda -->
  <text x="300" y="470" font-family="Georgia, serif" font-size="26" font-weight="300"
    fill="#6B5555" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="12" font-style="italic">glow soda</text>

  <!-- divider -->
  <line x1="210" y1="500" x2="390" y2="500" stroke="rgba(180,130,130,0.5)" stroke-width="1"/>

  <!-- LYCHEE PEACH -->
  <text x="300" y="535" font-family="Georgia, serif" font-size="22" font-weight="400"
    fill="#8B6060" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="7">LYCHEE PEACH</text>

  <!-- divider -->
  <line x1="210" y1="560" x2="390" y2="560" stroke="rgba(180,130,130,0.5)" stroke-width="1"/>

  <!-- glow with every sip -->
  <text x="300" y="595" font-family="Georgia, serif" font-size="16" font-weight="300"
    fill="#9B7070" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="4" font-style="italic">glow with every sip</text>

</svg>
