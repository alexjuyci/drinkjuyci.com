<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 520" width="300" height="520">
  <defs>
    <!-- Main body gradient: champagne to pink -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5ECD7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#F2D8E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2C4CE;stop-opacity:1" />
    </linearGradient>

    <!-- Shimmer overlay -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.0" />
      <stop offset="30%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="60%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.0" />
    </linearGradient>

    <!-- Top cap gradient -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4B8B8;stop-opacity:1" />
    </linearGradient>

    <!-- Bottom cap gradient -->
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B8B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4A8A8;stop-opacity:1" />
    </linearGradient>

    <!-- Clip path for can body -->
    <clipPath id="bodyClip">
      <rect x="40" y="60" width="220" height="390" rx="12" ry="12"/>
    </clipPath>

    <!-- Subtle vertical light streak -->
    <linearGradient id="streak" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.0" />
    </linearGradient>
  </defs>

  <!-- Can top (dome) -->
  <ellipse cx="150" cy="65" rx="110" ry="16" fill="url(#topGrad)"/>
  <rect x="40" y="60" width="220" height="16" fill="url(#topGrad)"/>

  <!-- Can body -->
  <rect x="40" y="60" width="220" height="390" rx="0" ry="0" fill="url(#bodyGrad)"/>

  <!-- Shimmer overlay on body -->
  <rect x="40" y="60" width="220" height="390" fill="url(#shimmer)" clip-path="url(#bodyClip)"/>

  <!-- Left edge shadow -->
  <rect x="40" y="60" width="18" height="390" fill="rgba(180,140,140,0.15)"/>

  <!-- Right edge shadow -->
  <rect x="242" y="60" width="18" height="390" fill="rgba(180,140,140,0.12)"/>

  <!-- Vertical light streak -->
  <rect x="80" y="60" width="28" height="390" fill="url(#streak)"/>

  <!-- Can bottom (dome) -->
  <ellipse cx="150" cy="450" rx="110" ry="16" fill="url(#botGrad)"/>
  <rect x="40" y="444" width="220" height="16" fill="url(#botGrad)"/>

  <!-- Top rim -->
  <ellipse cx="150" cy="60" rx="110" ry="16" fill="none" stroke="#D4B0B0" stroke-width="1.5"/>

  <!-- Bottom rim -->
  <ellipse cx="150" cy="450" rx="110" ry="16" fill="none" stroke="#C4A0A0" stroke-width="1.5"/>

  <!-- Pull tab -->
  <ellipse cx="150" cy="52" rx="20" ry="6" fill="#D4C0B0" stroke="#C4B0A0" stroke-width="1"/>
  <rect x="143" y="46" width="14" height="3" rx="1.5" fill="#C8B4A4"/>

  <!-- Thin decorative lines -->
  <line x1="40" y1="130" x2="260" y2="130" stroke="rgba(200,160,160,0.3)" stroke-width="0.5"/>
  <line x1="40" y1="390" x2="260" y2="390" stroke="rgba(200,160,160,0.3)" stroke-width="0.5"/>

  <!-- JUYCI wordmark -->
  <text
    x="150"
    y="255"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="300"
    fill="#2C2C2C"
    text-anchor="middle"
    letter-spacing="10"
    opacity="0.88"
  >JUYCI</text>

  <!-- glow soda -->
  <text
    x="150"
    y="285"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="300"
    fill="#6B5555"
    text-anchor="middle"
    letter-spacing="5"
    font-style="italic"
  >glow soda</text>

  <!-- Thin divider -->
  <line x1="110" y1="300" x2="190" y2="300" stroke="rgba(180,130,130,0.4)" stroke-width="0.5"/>

  <!-- LYCHEE PEACH -->
  <text
    x="150"
    y="322"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9.5"
    font-weight="400"
    fill="#8B6060"
    text-anchor="middle"
    letter-spacing="4"
  >LYCHEE PEACH</text>

  <!-- Thin divider bottom -->
  <line x1="110" y1="335" x2="190" y2="335" stroke="rgba(180,130,130,0.4)" stroke-width="0.5"/>

  <!-- Small tagline -->
  <text
    x="150"
    y="360"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7"
    font-weight="300"
    fill="#9B7070"
    text-anchor="middle"
    letter-spacing="2.5"
    font-style="italic"
  >it is summer everyday</text>

  <!-- 12 fl oz -->
  <text
    x="150"
    y="410"
    font-family="Arial, sans-serif"
    font-size="7"
    font-weight="300"
    fill="#9B7070"
    text-anchor="middle"
    letter-spacing="1.5"
  >12 FL OZ (355 mL)</text>

  <!-- Subtle top flourish dots -->
  <circle cx="126" cy="195" r="1.2" fill="rgba(180,130,130,0.35)"/>
  <circle cx="150" cy="190" r="1.2" fill="rgba(180,130,130,0.35)"/>
  <circle cx="174" cy="195" r="1.2" fill="rgba(180,130,130,0.35)"/>

</svg>
